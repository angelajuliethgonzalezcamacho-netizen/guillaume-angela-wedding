<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merci</title>

    <style>
        body{
            margin:0;
            font-family: Georgia, serif;
            background:#faf6f2;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            text-align:center;
        }

        .box{
            background:white;
            padding:50px;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,.08);
            max-width:600px;
        }

        h1{
            color:#9b7b66;
            font-size:42px;
        }

        p{
            font-size:22px;
            color:#666;
            line-height:1.6;
        }

        a{
            display:inline-block;
            margin-top:30px;
            padding:14px 30px;
            background:#9b7b66;
            color:white;
            text-decoration:none;
            border-radius:30px;
            font-size:18px;
        }

        a:hover{
            background:#866654;
        }
    </style>
</head>

<body>

<div class="box">

<h1>Merci ❤️</h1>

<p>
Votre présence a bien été confirmée.
</p>

<p>
Nous avons hâte de célébrer cette magnifique journée avec vous.
</p>

<a href="index.html">
Retour à l'invitation
</a>

</div>

</body>
</html>
